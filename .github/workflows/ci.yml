name: CI

on:
  push:
  workflow_dispatch:

env:
  REGION: europe-west1
  PROJECT_ID: photomap-499617
  IMAGE: europe-west1-docker.pkg.dev/photomap-499617/photomap/app

jobs:
  backend:
    name: backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.9"

      - run: uv sync

      - name: Run Django ORM tests
        run: uv run python manage.py test tests --exclude-tag=firestore

      - name: Set up Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Download Firestore emulator
        run: |
          mkdir -p $HOME/.cache/firebase/emulators
          curl -Lo $HOME/.cache/firebase/emulators/cloud-firestore-emulator.jar \
            https://storage.googleapis.com/firebase-preview-drop/emulator/cloud-firestore-emulator-v1.21.0.jar

      - name: Start Firestore emulator
        run: |
          java -jar $HOME/.cache/firebase/emulators/cloud-firestore-emulator.jar \
            --host=127.0.0.1 --port=8080 > /tmp/emulator.log 2>&1 &
          until curl -sf http://127.0.0.1:8080 > /dev/null 2>&1; do sleep 1; done
          echo "Firestore emulator ready"

      - name: Run Firestore model tests
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          GCLOUD_PROJECT: photomap-test
        run: uv run python -m pytest tests/test_firestore_models.py -v

  frontend:
    name: frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --legacy-peer-deps
      - run: npm run test

  docker:
    name: build & push Docker image
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/reborn'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/44054328514/locations/global/workloadIdentityPools/github/providers/github
          service_account: photomap-ci@photomap-499617.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate Docker to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline
